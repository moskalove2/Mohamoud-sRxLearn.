*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafb;color:#1a1a1a}
.lock{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;background:#fff}

.lock p{font-size:14px;color:#666;margin-bottom:2rem}

.lock input:focus{border-color:#1D9E75}
.lock button{width:100%;max-width:320px;padding:14px;background:#1D9E75;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer}
.lock button:hover{background:#0F6E56}
.lock-err{font-size:13px;color:#e33;margin-top:10px;display:none}
.lock-err.show{display:block}
.app{display:none;max-width:900px;margin:0 auto;padding-bottom:3rem}
.hdr{background:#1D9E75;color:#fff;padding:1rem 1.25rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-icon{font-size:28px}.hdr h1{font-size:20px;font-weight:700}.hdr p{font-size:12px;opacity:0.85}
.tabs{display:flex;background:#fff;border-bottom:2px solid #eee;overflow-x:auto;position:sticky;top:64px;z-index:99}
.tab{padding:12px 16px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:#666;white-space:nowrap;transition:all 0.15s;font-weight:500}
.tab.active{color:#1D9E75;border-bottom-color:#1D9E75}
.content{padding:1.25rem}
.search-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.search-bar input{flex:1;min-width:160px;padding:10px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.search-bar input:focus{border-color:#1D9E75}
.search-bar select{padding:10px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;outline:none;background:#fff}
.drug-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:8px;margin-bottom:1.25rem}
.drug-btn{padding:10px 12px;border-radius:8px;font-size:13px;cursor:pointer;border:1.5px solid #e5e5e5;background:#fff;text-align:left;transition:all 0.15s}
.drug-btn:hover{border-color:#1D9E75;background:#f0faf6}
.drug-btn.sel{border-color:#1D9E75;background:#E1F5EE}
.drug-btn .dc{font-size:11px;color:#888;margin-top:2px}
.drug-card{border-radius:12px;overflow:hidden;border:1.5px solid #e5e5e5;background:#fff;margin-bottom:1rem}
.dc-top{padding:1.5rem;text-align:center}
.dc-name{font-size:24px;font-weight:700;margin-bottom:6px}
.dc-badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:8px}
.dc-moa{font-size:13px;opacity:0.8;line-height:1.5}
.dc-body{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:1.25rem;border-top:1.5px solid #eee}
.dc-block label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:4px;font-weight:600}
.dc-block p{font-size:13px;line-height:1.6}
.dc-block.full{grid-column:1/-1}
.chapter-list{display:flex;flex-direction:column;gap:10px}
.chapter{border:1.5px solid #e5e5e5;border-radius:12px;background:#fff;overflow:hidden}
.ch-hdr{padding:14px 18px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:600;font-size:15px}
.ch-hdr:hover{background:#f8f8f8}
.ch-badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;margin-left:8px}
.ch-body{display:none;border-top:1.5px solid #eee}
.ch-body.open{display:block}
.subgroup{padding:12px 18px;border-bottom:1px solid #f0f0f0}
.subgroup:last-child{border-bottom:none}
.sg-title{font-size:13px;font-weight:600;color:#444;margin-bottom:8px}
.sg-drugs{display:flex;flex-wrap:wrap;gap:6px}

.sg-drug:hover{background:#1D9E75;color:#fff}
.quiz-wrap{max-width:680px;margin:0 auto}
.quiz-case{background:#fff;border:1.5px solid #e5e5e5;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.quiz-case-label{font-size:11px;font-weight:700;color:#1D9E75;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
.quiz-vignette{font-size:14px;line-height:1.7;color:#333;margin-bottom:1rem;padding:1rem;background:#f8fafb;border-radius:8px;border-left:4px solid #1D9E75}
.quiz-q{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:1rem}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.quiz-opt{padding:12px 16px;border:1.5px solid #e5e5e5;border-radius:8px;cursor:pointer;font-size:14px;background:#fff;text-align:left;transition:all 0.15s}
.quiz-opt:hover:not(:disabled){background:#f0faf6;border-color:#1D9E75}
.quiz-opt.correct{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.quiz-opt.wrong{background:#FCEBEB;border-color:#e33;color:#501313}
.quiz-fb{padding:12px 16px;border-radius:8px;font-size:13px;line-height:1.6;margin-bottom:1rem;display:none}
.quiz-fb.show{display:block}
.quiz-fb.correct{background:#E1F5EE;color:#085041}
.quiz-fb.wrong{background:#FCEBEB;color:#501313}
.quiz-nav{display:flex;justify-content:space-between;align-items:center}
.progress{height:6px;background:#eee;border-radius:3px;margin-bottom:1rem}
.prog-bar{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.3s}
.btn{padding:10px 20px;border-radius:8px;font-size:14px;cursor:pointer;border:1.5px solid #ddd;background:#fff;font-weight:500}
.btn-primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-primary:hover{background:#0F6E56}
.score-txt{font-size:14px;color:#666}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1.5px solid #e5e5e5;border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:28px;font-weight:700;color:#1D9E75}
.stat-label{font-size:12px;color:#888;margin-top:2px}
</style>
</head>

<div class="lock" id="lockScreen">

        <div id="quizArea"></div>
      </div>
    </div>
  </div>
</div>

const quizCases=[
  {v:"A 62-year-old diabetic hypertensive man post-MI has a persistent dry cough since starting lisinopril. BP is 148/92 mmHg.",q:"What is the most appropriate change to antihypertensive therapy?",opts:["Stop all antihypertensive therapy","Switch lisinopril to losartan (ARB)","Add amlodipine and continue lisinopril","Switch to atenolol only"],ans:1,e:"Dry cough is a class effect of ACE inhibitors (bradykinin accumulation). Switching to an ARB (e.g. losartan) gives equivalent BP and organ protection without cough."},
  {v:"A 28-year-old woman with generalised tonic-clonic epilepsy is started on sodium valproate. She is sexually active with no contraception.",q:"What is the most important concern with this prescription?",opts:["Weekly LFTs required indefinitely","Valproate is highly teratogenic — avoid in women of childbearing age without strict contraception","Valproate causes irreversible renal failure","It has no efficacy in generalised epilepsy"],ans:1,e:"Valproate is a potent teratogen (neural tube defects, cognitive impairment, autism). In women of childbearing potential, it must be used only if alternatives fail, with mandatory contraception and the Prevent Programme registration."},
  {v:"A 55-year-old asthmatic is admitted with acute severe asthma. SpO₂ 90%, HR 120. His salbutamol inhaler has given no relief after 8 uses today.",q:"Which combination of treatments is most appropriate immediately?",opts:["Oral prednisolone alone","Nebulised salbutamol + ipratropium + IV hydrocortisone + oxygen","Intubation immediately","Oral montelukast and cetirizine"],ans:1,e:"Acute severe asthma requires: high-flow oxygen, nebulised SABA (salbutamol) + SAMA (ipratropium) for bronchodilation, and systemic corticosteroids (IV hydrocortisone or oral prednisolone). This is the GINA/BTS standard of care."},
  {v:"A 70-year-old woman on warfarin for AF is given amoxicillin for a chest infection. Five days later her INR is 7.2 with easy bruising.",q:"Why has her INR increased so dramatically?",opts:["Amoxicillin directly inhibits vitamin K","Amoxicillin kills gut bacteria that produce vitamin K, potentiating warfarin","Amoxicillin blocks CYP2C9 — the enzyme metabolising warfarin","The warfarin dose was accidentally doubled"],ans:1,e:"Antibiotics like amoxicillin reduce gut flora responsible for vitamin K₂ synthesis, reducing vitamin K availability and potentiating warfarin. Close INR monitoring is essential when antibiotics are co-prescribed with warfarin."},
  {v:"A 35-year-old woman presents with 6 weeks of low mood, early morning waking, anhedonia and poor concentration. No prior psychiatric history.",q:"Which antidepressant is most appropriate as first-line therapy?",opts:["Amitriptyline 75 mg at night","Sertraline 50 mg daily","Haloperidol 5 mg daily","Diazepam 5 mg three times daily"],ans:1,e:"SSRIs (e.g. sertraline) are first-line for depression due to efficacy, safety and tolerability. TCAs are second-line due to cardiotoxicity and anticholinergic effects. Haloperidol is an antipsychotic; benzodiazepines do not treat depression."},
  {v:"A 45-year-old with treatment-resistant schizophrenia (failed two antipsychotics) starts clozapine. Three weeks later, neutrophils are 0.8 × 10⁹/L.",q:"What is the most appropriate immediate action?",opts:["Continue clozapine and recheck in 2 weeks","Stop clozapine immediately — this indicates dangerous neutropenia","Reduce the clozapine dose by half","Add G-CSF and continue clozapine"],ans:1,e:"Clozapine causes agranulocytosis in ~1-2% of patients. Neutrophils <1.5 × 10⁹/L requires immediate action; <0.5 × 10⁹/L is a medical emergency — stop clozapine immediately. Mandatory weekly WBC monitoring is required."},
  {v:"A 68-year-old COPD patient (FEV₁ 45% predicted) has two exacerbations per year despite PRN salbutamol.",q:"What is the most appropriate step-up in his COPD management?",opts:["Add an inhaled corticosteroid alone","Add a long-acting bronchodilator (LAMA or LABA)","Start oral prednisolone long-term","Add montelukast"],ans:1,e:"GOLD guidelines recommend adding a long-acting bronchodilator (LAMA or LABA) as the first step-up in COPD with persistent symptoms or exacerbations despite SABA. ICS monotherapy is not recommended in COPD."},
  {v:"A 52-year-old unconscious woman (GCS 8). Her husband reports she may have taken 'all her tablets.' ECG shows wide QRS and prolonged QT.",q:"Which drug overdose is most consistent with this presentation?",opts:["SSRI (sertraline) overdose","TCA (amitriptyline) overdose","Benzodiazepine (diazepam) overdose","Antihistamine (cetirizine) overdose"],ans:1,e:"TCA overdose classically causes: CNS depression, wide QRS (Na⁺ channel blockade), prolonged QT → ventricular arrhythmias, hypotension, and anticholinergic toxidrome. IV sodium bicarbonate is the treatment. SSRIs rarely cause significant ECG changes."},
  {v:"A 58-year-old man with type 2 DM and HFrEF (EF 30%) is being optimised. His eGFR is 55 mL/min and HbA1c is 68 mmol/mol on metformin alone.",q:"Which additional glucose-lowering agent has proven cardiovascular AND heart failure benefit?",opts:["Glibenclamide","Empagliflozin (SGLT-2 inhibitor)","Sitagliptin (DPP-4 inhibitor)","Exenatide (GLP-1 agonist — weekly injection)"],ans:1,e:"SGLT-2 inhibitors (empagliflozin, dapagliflozin) have landmark trial evidence for reducing HF hospitalisations, CV mortality, and CKD progression in T2DM. They are now first-line additions in T2DM with HFrEF regardless of HbA1c."},
  {v:"A 34-year-old HIV-positive man is started on TB treatment (RIPE regimen). Two weeks later his HIV viral load rises despite continuing his antiretroviral therapy.",q:"Which TB drug is responsible and why?",opts:["Isoniazid — peripheral neuropathy impairs adherence","Rifampicin — potent CYP inducer reduces antiretroviral blood levels","Pyrazinamide — direct antiviral antagonism","Ethambutol — optic neuritis prevents absorption"],ans:1,e:"Rifampicin is a potent inducer of cytochrome P450 enzymes (especially CYP3A4, CYP2B6). This dramatically reduces blood levels of many antiretroviral drugs, leading to virological failure. Rifabutin is used as a safer alternative in HIV/TB coinfection."},
  {v:"A 72-year-old woman with osteoporosis is prescribed alendronate. She calls the next morning saying she has severe chest pain and difficulty swallowing.",q:"What is the most likely cause and what should you advise?",opts:["She is having an MI — call emergency services immediately","Oesophageal irritation from alendronate — ensure she takes it with a full glass of water and stays upright for 30 minutes","She has developed osteonecrosis of the jaw","This is a normal effect — continue the medication"],ans:1,e:"Bisphosphonates like alendronate can cause severe oesophageal irritation and ulceration if not taken correctly. Patients must take with a full glass of plain water, remain upright for at least 30 minutes after, and not eat or drink other fluids until after that period."},
  {v:"A 29-year-old pregnant woman (32 weeks) develops a UTI. Urine culture grows E. coli sensitive to multiple antibiotics.",q:"Which antibiotic is the safest choice at 32 weeks gestation?",opts:["Ciprofloxacin","Trimethoprim","Cefalexin","Doxycycline"],ans:2,e:"At 32 weeks: ciprofloxacin is avoided (cartilage toxicity); trimethoprim is a folate antagonist; doxycycline causes tooth discolouration and is teratogenic. Cefalexin (cephalexin) is the safest option across pregnancy for UTIs and is used widely."},
  {v:"A 40-year-old man presents with an acute gout attack. His serum urate is 520 μmol/L. He is already on allopurinol 300 mg daily.",q:"Which drug is most appropriate to treat the acute attack?",opts:["Increase allopurinol immediately","Colchicine or NSAID (e.g. naproxen) for the acute attack; do NOT change allopurinol during an attack","Start febuxostat","Stop allopurinol permanently"],ans:1,e:"During an acute gout attack, allopurinol should NOT be started or stopped — changing urate levels can prolong or worsen the attack. Acute treatment is colchicine (first-line if tolerated) or an NSAID. Allopurinol dose can be reviewed once the acute attack resolves."},
  {v:"A 25-year-old woman presents with new-onset seizures. MRI shows no abnormality. EEG shows generalised spike-and-wave discharges. She is started on medication.",q:"Which antiepileptic drug would be MOST appropriate for generalised epilepsy in a woman of childbearing age?",opts:["Sodium valproate — most effective for generalised epilepsy","Lamotrigine — effective for generalised epilepsy with better safety profile in women","Carbamazepine — best for generalised tonic-clonic seizures","Phenytoin — first-line for all seizure types"],ans:1,e:"Lamotrigine is preferred in women of childbearing age due to its lower teratogenic risk compared to valproate. It is effective for generalised epilepsy. Valproate is the most teratogenic antiepileptic and requires strict contraception and the Prevent Programme if used in women of childbearing potential."},
  {v:"A 60-year-old man is started on digoxin for AF rate control. He presents 1 week later with nausea, vomiting, and seeing yellow halos around lights. HR is 48 bpm.",q:"What is the most likely diagnosis and initial management?",opts:["Gastroenteritis — continue digoxin and rehydrate","Digoxin toxicity — stop digoxin, check digoxin level + electrolytes (especially K⁺), cardiac monitoring","Optic neuritis — refer to ophthalmology","Normal side effects — reduce digoxin dose and continue"],ans:1,e:"Digoxin toxicity presents with nausea, vomiting, visual disturbances (yellow/green halos — xanthopsia), bradycardia, and arrhythmias. Hypokalaemia significantly increases toxicity risk. Management: stop digoxin, measure serum digoxin level and electrolytes, cardiac monitoring, and consider digoxin-specific antibody fragments (DigiFab) in severe cases."},
  {v:"A 30-year-old man with rheumatoid arthritis is started on methotrexate 15 mg weekly. His GP also prescribes ibuprofen 400 mg three times daily for joint pain.",q:"What is the most important drug interaction concern?",opts:["No significant interaction — safe to use together","NSAIDs like ibuprofen reduce methotrexate excretion → ↑ methotrexate toxicity risk (myelosuppression, hepatotoxicity)","Ibuprofen reduces the efficacy of methotrexate","Methotrexate increases ibuprofen levels causing GI bleed"],ans:1,e:"NSAIDs inhibit renal tubular secretion of methotrexate, increasing its plasma concentration and risk of serious toxicity (myelosuppression, hepatotoxicity, mucositis). This interaction is particularly dangerous with weekly high-dose methotrexate regimens. Use paracetamol instead or monitor very closely."},
  {v:"A 65-year-old woman is admitted with septic shock. BP is 75/40 mmHg. She has received 3L IV fluids with no improvement in BP.",q:"Which vasopressor is recommended as first-line in septic shock?",opts:["Dobutamine — to increase cardiac output","Noradrenaline — first-line vasopressor in septic shock","Adrenaline — most potent vasopressor","Vasopressin alone"],ans:1,e:"Noradrenaline (norepinephrine) is the first-line vasopressor for septic shock (Surviving Sepsis Guidelines). It acts primarily on α₁ receptors to restore vascular tone. Vasopressin can be added as second-line. Adrenaline is second-line. Dobutamine is used for low cardiac output (cardiogenic shock), not vasodilation."},
  {v:"A 55-year-old man with Parkinson's disease on levodopa/carbidopa develops vivid hallucinations. His motor control is reasonably good.",q:"Which antipsychotic is SAFEST for hallucinations in Parkinson's disease?",opts:["Haloperidol — most effective antipsychotic","Quetiapine (low dose) or clozapine — preferred in Parkinson's as they cause minimal EPS","Risperidone — atypical with good tolerability","Olanzapine — best metabolic profile"],ans:1,e:"Most antipsychotics worsen Parkinson's motor symptoms by blocking dopamine receptors (EPS). Quetiapine (low dose) and clozapine have the lowest D₂ affinity and are therefore preferred in Parkinson's psychosis. Haloperidol, risperidone, and olanzapine are avoided as they worsen motor symptoms significantly."},
  {v:"A 48-year-old man is started on isoniazid for latent TB. Six weeks later he complains of numbness and tingling in his hands and feet.",q:"What is the cause and how should it be managed?",opts:["TB reactivation — start full RIPE therapy","Isoniazid-induced peripheral neuropathy due to pyridoxine (B6) deficiency — treat with pyridoxine supplementation","Isoniazid hepatotoxicity — stop immediately","Normal side effect — reassure and continue without change"],ans:1,e:"Isoniazid inhibits pyridoxine (vitamin B6) metabolism, leading to peripheral neuropathy in susceptible patients (slow acetylators, diabetics, malnourished, alcoholics, elderly). Prevention and treatment: pyridoxine 10-25 mg/day supplementation should be co-prescribed with isoniazid in high-risk patients."},
  {v:"A 78-year-old woman with atrial fibrillation is started on warfarin. She also takes aspirin 75 mg daily and omeprazole. Her INR is stable at 2.5. She is prescribed clarithromycin for a chest infection.",q:"What will happen to her INR?",opts:["INR will decrease — clarithromycin induces warfarin metabolism","INR will increase — clarithromycin inhibits CYP3A4 reducing warfarin metabolism, and also reduces gut flora","No significant change","INR will only change if warfarin dose is adjusted"],ans:1,e:"Clarithromycin is a potent CYP3A4 inhibitor — it reduces warfarin metabolism, increasing warfarin plasma levels and raising the INR, increasing bleeding risk. Close INR monitoring is mandatory when macrolides are co-prescribed with warfarin. Additionally, antibiotics reduce gut bacteria that produce vitamin K₂."},
  {v:"A 19-year-old student presents with a first episode of psychosis. He is started on an antipsychotic. 6 months later he has gained 18 kg and has new-onset type 2 diabetes.",q:"Which antipsychotic is most likely responsible?",opts:["Haloperidol — most common cause of metabolic syndrome","Olanzapine — one of the highest risk antipsychotics for weight gain and metabolic syndrome","Aripiprazole — significant metabolic risk","Quetiapine has no metabolic effects"],ans:1,e:"Olanzapine has the highest risk of metabolic side effects among antipsychotics — it causes significant weight gain, dyslipidaemia, and new-onset type 2 diabetes. This is mediated by H₁, 5-HT₂C, and muscarinic receptor blockade affecting appetite and insulin signalling. Aripiprazole and amisulpride have much lower metabolic risk."},
  {v:"A 33-year-old woman with type 1 diabetes is brought in unconscious. Blood glucose is 1.8 mmol/L. She is unable to swallow.",q:"What is the most appropriate immediate treatment?",opts:["Oral glucose gel — safest as she has type 1 DM","IV dextrose 10% or 50% glucose, OR IM glucagon 1 mg","Oral orange juice — raises blood glucose quickly","Subcutaneous insulin dose reduction"],ans:1,e:"In severe hypoglycaemia with impaired consciousness, oral glucose is contraindicated (aspiration risk). IV glucose (10% or 50% dextrose) is the fastest treatment in hospital. If IV access is unavailable, IM glucagon 1 mg stimulates hepatic glycogenolysis. Glucagon is ineffective in patients who are depleted of glycogen (prolonged starvation, alcohol excess)."},
  {v:"A 50-year-old man with CKD (eGFR 22 mL/min) develops hyperkalaemia (K⁺ = 7.2 mmol/L). ECG shows peaked T waves and wide QRS complex.",q:"What is the FIRST priority in emergency management of severe hyperkalaemia?",opts:["IV insulin + glucose — lowers K⁺ fastest","IV calcium gluconate — stabilises the cardiac membrane (FIRST priority to prevent fatal arrhythmias)","Salbutamol nebuliser — effective at shifting K⁺","Calcium resonium — removes K⁺ from the body"],ans:1,e:"In severe symptomatic hyperkalaemia with ECG changes, IV calcium gluconate is the FIRST priority as it stabilises the cardiac membrane immediately, reducing the risk of fatal arrhythmias. It does NOT lower K⁺. After membrane stabilisation, IV insulin+glucose and nebulised salbutamol shift K⁺ into cells. Definitive K⁺ removal requires calcium resonium, loop diuretics, or dialysis."},
  {v:"A 42-year-old woman presents with palpitations and sweating. She has a goitre. Thyroid function shows TSH 0.02, T4 155. She is started on carbimazole. She calls 2 weeks later with a high fever and sore throat.",q:"What is the most critical concern?",opts:["Viral pharyngitis — reassure and manage symptomatically","Agranulocytosis from carbimazole — STOP carbimazole immediately and check urgent FBC","She needs a dose increase of carbimazole","This is expected hyperthyroid symptom — continue treatment"],ans:1,e:"Agranulocytosis occurs in ~1% of patients on carbimazole — characteristically presenting with fever and sore throat. It is potentially fatal. Patients must be counselled to STOP carbimazole and seek URGENT medical attention if they develop these symptoms. Immediate FBC is essential. Never restart carbimazole after agranulocytosis."},
  {v:"An 8-year-old boy presents with malaria after returning from sub-Saharan Africa. P. falciparum is confirmed. He is conscious and can swallow.",q:"What is the most appropriate first-line treatment?",opts:["Chloroquine — most widely available antimalarial","Artemether/lumefantrine — first-line for uncomplicated P. falciparum malaria","Quinine monotherapy — best for falciparum","Mefloquine — safest in children"],ans:1,e:"Artemether/lumefantrine (Coartem) is the WHO-recommended first-line treatment for uncomplicated P. falciparum malaria. Chloroquine resistance is widespread in P. falciparum. Quinine is reserved for severe/complicated malaria. Artemisinin-based combination therapies (ACTs) are the global standard for falciparum treatment."},
  {v:"A 65-year-old man with a prosthetic heart valve develops bacterial endocarditis. Blood cultures grow MRSA. His renal function is normal.",q:"Which antibiotic is most appropriate for MRSA endocarditis?",opts:["Co-amoxiclav — excellent Gram+ coverage","Vancomycin — gold standard for MRSA infections","Flucloxacillin — first-line for Staphylococcal endocarditis","Amoxicillin — covers streptococcal endocarditis"],ans:1,e:"Vancomycin is the gold standard treatment for MRSA infections including endocarditis. Flucloxacillin covers MSSA (methicillin-sensitive Staph aureus) but NOT MRSA. Co-amoxiclav and amoxicillin have no MRSA coverage. Vancomycin levels must be monitored carefully to ensure efficacy and avoid nephrotoxicity."},
  {v:"A 22-year-old man with schizophrenia is non-compliant with oral medication. His psychiatrist wants to switch to a depot injection.",q:"Which of the following is available as a long-acting injectable (depot) antipsychotic?",opts:["Clozapine — available as monthly injection","Risperidone (Risperdal Consta) — available as depot injection every 2 weeks","Olanzapine has no injectable formulation","Quetiapine depot is the most widely used"],ans:1,e:"Risperidone (Risperdal Consta) and paliperidone are available as long-acting injectable depot formulations, useful for patients with adherence difficulties. Clozapine is NOT available as a depot. Olanzapine pamoate is available as a monthly depot but requires 3-hour observation post-injection due to post-injection syndrome risk."},
  {v:"A 45-year-old man with type 2 DM on metformin 1g BD has an HbA1c of 75 mmol/mol. His eGFR is 65 mL/min and BMI is 36 kg/m².",q:"Which drug addition would best address both glycaemic control AND weight reduction?",opts:["Glibenclamide — effective glucose lowering","A GLP-1 receptor agonist (e.g. liraglutide or semaglutide) — lowers glucose AND promotes significant weight loss","Insulin glargine — best glycaemic control","Sitagliptin — neutral on weight, good tolerability"],ans:1,e:"GLP-1 receptor agonists (e.g. liraglutide, semaglutide) lower blood glucose AND cause significant weight loss (5-15 kg) by reducing appetite and slowing gastric emptying. They are ideal in obese T2DM patients. They also have cardiovascular benefit. Glibenclamide and insulin cause weight gain. Sitagliptin is weight-neutral."},
  {v:"A 55-year-old woman with rheumatoid arthritis on methotrexate 20 mg weekly develops mouth ulcers and fatigue. Her FBC shows: Hb 9.2 g/dL, WBC 2.1 × 10⁹/L, platelets 88 × 10⁹/L.",q:"What is the most likely cause of these findings?",opts:["RA flare causing bone marrow inflammation","Methotrexate-induced myelosuppression — reduce or hold methotrexate and give folinic acid (leucovorin) rescue","Iron deficiency from chronic disease","Concurrent parvovirus B19 infection"],ans:1,e:"Methotrexate inhibits dihydrofolate reductase → ↓ folate → impaired DNA synthesis in rapidly dividing cells (bone marrow, GI mucosa). This causes myelosuppression (pancytopenia) and mucositis (mouth ulcers). Treatment: hold methotrexate, give folinic acid (leucovorin — bypasses the DHFR block), and review the dose. Folic acid supplementation daily (not on methotrexate day) reduces but does not eliminate this risk."},
  {v:"A 38-year-old man presents with acute severe lower back pain radiating to his groin. CT KUB confirms a 5 mm ureteric stone. He is in agony.",q:"What is the most appropriate analgesic management for acute renal colic?",opts:["Paracetamol alone — safest in renal colic","Diclofenac (NSAID) IM/PR — first-line analgesic for renal colic (reduces ureteric spasm)","Morphine IM — fastest relief","Tramadol oral — best opioid for renal colic"],ans:1,e:"NSAIDs (e.g. diclofenac) are first-line for acute renal colic — they reduce prostaglandin-mediated ureteric smooth muscle spasm, providing superior analgesia compared to opioids for this indication. They should be avoided if eGFR is significantly reduced. IM diclofenac or rectal diclofenac is appropriate if IV access is unavailable."},
  {v:"A 67-year-old man with HFrEF (EF 25%) is on optimal medical therapy including ramipril, bisoprolol, and furosemide. His NYHA class remains III.",q:"Which additional drug has been shown to reduce mortality in HFrEF and should be added?",opts:["Amlodipine — reduces afterload","Spironolactone (or eplerenone) — aldosterone antagonist with proven mortality benefit in HFrEF","Digoxin — first choice add-on for HFrEF","Atenolol — superior to bisoprolol in HF"],ans:1,e:"Aldosterone antagonists (spironolactone, eplerenone) reduce mortality in HFrEF on top of ACEi and beta-blockers (RALES and EPHESUS trials). They must be used with caution regarding hyperkalaemia and renal function. Sacubitril/valsartan (ARNI) should also be considered to replace the ACEi once stable. Amlodipine is avoided in systolic HF."},
  {v:"A 19-year-old student is started on doxycycline for acne. He asks about sun exposure as he is going on holiday.",q:"What is the most important counselling point about doxycycline and sun exposure?",opts:["No precautions needed — doxycycline has no photosensitivity risk","Doxycycline causes photosensitivity — avoid prolonged sun exposure and use high-SPF sunscreen","Use only at night to avoid photosensitivity","Take with food to reduce photosensitivity"],ans:1,e:"Doxycycline (and other tetracyclines) causes photosensitivity by sensitising the skin to UV radiation, resulting in exaggerated sunburn reactions. Patients must be counselled to: use high-factor sunscreen (SPF 30+), wear protective clothing, and avoid prolonged sun exposure or sunbeds. This is a very commonly examined counselling point."},
  {v:"A 70-year-old man with AF is anticoagulated with rivaroxaban. He presents to A&E with haematuria and a haemoglobin drop from 13.5 to 9.2 g/dL.",q:"What is the most appropriate management of rivaroxaban-associated major bleeding?",opts:["Vitamin K IV — reverses rivaroxaban","Andexanet alfa (recombinant factor Xa) or prothrombin complex concentrate (PCC) — reverses rivaroxaban","Fresh frozen plasma alone is sufficient","Stop rivaroxaban and observe — it will wear off in 12 hours"],ans:1,e:"There is no universal antidote for direct Xa inhibitors like rivaroxaban. Andexanet alfa (recombinant factor Xa decoy) is the specific reversal agent. Where unavailable, 4-factor prothrombin complex concentrate (PCC) is used. Vitamin K reverses warfarin NOT rivaroxaban. Fresh frozen plasma alone is insufficient for DOAC reversal."},
  {v:"A 48-year-old woman presents with an acute severe headache — 'worst headache of her life' — rated 10/10, sudden onset, occipital. After subarachnoid haemorrhage is confirmed on CT.",q:"Which drug is given to prevent cerebral vasospasm after SAH?",opts:["Aspirin — prevents platelet aggregation in cerebral vessels","Nimodipine — calcium channel blocker that prevents cerebral vasospasm after SAH","Heparin — prevents thrombus in cerebral vessels","Dexamethasone — reduces cerebral oedema"],ans:1,e:"Nimodipine (a dihydropyridine CCB with selectivity for cerebral arteries) is given routinely after subarachnoid haemorrhage to prevent delayed cerebral ischaemia from vasospasm. It improves neurological outcome. It is started within 4 days of the bleed and continued for 21 days."},
  {v:"A 35-year-old woman with bipolar I disorder is stable on lithium 800 mg daily. She is planning a pregnancy.",q:"What is the most important counselling point regarding lithium in pregnancy?",opts:["Lithium is completely safe in all trimesters","Lithium is associated with Ebstein's anomaly (cardiac defect) in the first trimester — discuss risk-benefit carefully and consider alternative mood stabiliser","Lithium should be continued at the same dose throughout pregnancy","Lithium causes neural tube defects like valproate"],ans:1,e:"Lithium is associated with Ebstein's anomaly (downward displacement of the tricuspid valve) when taken in the first trimester, although the absolute risk is low. In women planning pregnancy, the risk-benefit of continuing lithium must be carefully discussed. Lamotrigine is often preferred as a safer alternative. If lithium is continued, detailed fetal echocardiography is recommended at 18-20 weeks."},
  {v:"A 60-year-old man develops C. difficile infection after a course of ciprofloxacin for a UTI. He has moderate disease with 6 watery stools per day.",q:"What is the most appropriate treatment for moderate C. difficile infection?",opts:["Ciprofloxacin (higher dose)","Oral vancomycin or fidaxomicin — first-line for C. difficile infection","IV metronidazole alone — sufficient for all cases","Stop antibiotics only — no specific treatment needed"],ans:1,e:"C. difficile infection treatment: for moderate-severe disease, oral vancomycin 125 mg four times daily for 10-14 days is first-line (not IV — poor colonic penetration). Fidaxomicin is equally effective with lower recurrence rates. Oral/IV metronidazole is now second-line. The precipitating antibiotic (ciprofloxacin) must be stopped if possible."},
  {v:"A 25-year-old man with severe Crohn's disease fails to respond to steroids and azathioprine. His CRP is 85 and he has significant weight loss.",q:"Before starting infliximab (anti-TNF therapy), what screening is mandatory?",opts:["Only HIV screening is required","TB screening (Mantoux/IGRA + CXR) — anti-TNF therapy can reactivate latent TB","Hepatitis A serology only","No screening required before biologic therapy"],ans:1,e:"Anti-TNF therapy (infliximab, adalimumab) can reactivate latent TB, causing disseminated/extrapulmonary TB which can be fatal. ALL patients must be screened for latent TB (IGRA/Mantoux test + chest X-ray) before starting anti-TNF therapy. Hepatitis B serology is also required. Patients with latent TB must complete prophylactic treatment before starting anti-TNF therapy."},
  {v:"A 58-year-old woman with breast cancer is on tamoxifen. Her oncologist wants to add an SSRI for menopausal hot flushes.",q:"Which SSRI should be AVOIDED with tamoxifen?",opts:["Sertraline — safe with tamoxifen","Citalopram — minimal CYP2D6 inhibition","Paroxetine or fluoxetine — AVOID as they strongly inhibit CYP2D6, reducing tamoxifen to its active metabolite (endoxifen)","Escitalopram — safe to use"],ans:2,e:"Tamoxifen requires CYP2D6 metabolism to form its active metabolite endoxifen. Paroxetine and fluoxetine are potent CYP2D6 inhibitors and significantly reduce endoxifen levels, potentially reducing tamoxifen's anti-cancer efficacy. Sertraline, citalopram, and escitalopram have minimal CYP2D6 inhibition and are preferred SSRIs in patients taking tamoxifen."},
  {v:"A 72-year-old man with severe COPD (FEV₁ 28% predicted) is admitted with an acute exacerbation. He is drowsy. ABG shows pH 7.28, PaCO₂ 8.2 kPa, PaO₂ 7.1 kPa on 28% O₂.",q:"What is the most appropriate immediate respiratory management?",opts:["Increase O₂ to 100% via non-rebreather mask","Start non-invasive ventilation (NIV/BiPAP) — type 2 respiratory failure not responding to controlled O₂","Intubate and ventilate immediately","Start salbutamol nebulisers only and monitor"],ans:1,e:"This patient has type 2 respiratory failure (hypercapnia pH 7.28, CO₂ 8.2 kPa) not responding to controlled O₂ therapy. NIV (BiPAP) is first-line in COPD exacerbations with type 2 respiratory failure — it reduces CO₂, improves pH, reduces work of breathing, and reduces mortality. It should be started promptly. Intubation is reserved for NIV failure."},
  {v:"A 45-year-old woman is started on metformin for T2DM. She returns 3 months later with low vitamin B12 levels and mild peripheral neuropathy.",q:"What is the mechanism by which metformin causes B12 deficiency?",opts:["Metformin directly destroys vitamin B12 in the stomach","Metformin inhibits calcium-dependent ileal B12 absorption (intrinsic factor-B12 complex)","Metformin increases renal B12 excretion","Metformin competes with B12 for transport across the gut wall"],ans:1,e:"Metformin inhibits calcium-dependent absorption of the vitamin B12-intrinsic factor complex in the terminal ileum. This leads to B12 deficiency over time, which can cause peripheral neuropathy, macrocytic anaemia, and subacute combined degeneration of the spinal cord. B12 levels should be checked periodically in patients on long-term metformin, and supplementation given if deficient."},
];

let filteredDrugs=[...allDrugs],curDrug=0,qIdx=0,score=0,answered=false;

function unlock(){
  if(document.getElementById("pwInput").value==="Pharm2024"){
    document.getElementById("lockScreen").style.display="none";
    document.getElementById("mainApp").style.display="block";
    renderStats();renderDrugGrid();renderChapters();loadQ();
  } else {
    const e=document.getElementById("lockErr");
    e.classList.add("show");
    document.getElementById("pwInput").value="";
    setTimeout(()=>e.classList.remove("show"),3000);
  }
}
function switchTab(t){
  ["flash","chapters","quiz"].forEach(x=>document.getElementById("tab-"+x).style.display=x===t?"block":"none");
  document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",["flash","chapters","quiz"][i]===t));
  if(t==="quiz"){qIdx=0;score=0;loadQ();}
}
function renderStats(){
  document.getElementById("statsBar").innerHTML=`
    <div class="stat-card"><div class="stat-num">${allDrugs.length}</div><div class="stat-label">Total Drugs</div></div>
    <div class="stat-card"><div class="stat-num">${[...new Set(allDrugs.map(d=>d.ch))].length}</div><div class="stat-label">Chapters</div></div>
    <div class="stat-card"><div class="stat-num">${quizCases.length}</div><div class="stat-label">Clinical Cases</div></div>
    <div class="stat-card"><div class="stat-num">${[...new Set(allDrugs.map(d=>d.cls))].length}</div><div class="stat-label">Drug Classes</div></div>`;
}
function filterDrugs(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const ch=document.getElementById("chapterFilter").value;
  filteredDrugs=allDrugs.filter(d=>(!q||d.name.toLowerCase().includes(q)||d.cls.toLowerCase().includes(q)||d.sub.toLowerCase().includes(q))&&(!ch||d.ch===ch));
  curDrug=0;renderDrugGrid();
}
function renderDrugGrid(){
  document.getElementById("drugGrid").innerHTML=filteredDrugs.map((d,i)=>`<button class="drug-btn ${i===curDrug?"sel":""}" onclick="selDrug(${i})"><strong>${d.name}</strong><div class="dc">${d.cls}</div></button>`).join("");
  renderDrugCard();
}
function selDrug(i){curDrug=i;renderDrugGrid();}
function renderDrugCard(){
  if(!filteredDrugs.length){document.getElementById("drugCard").innerHTML="<p style='color:#888;text-align:center;padding:2rem'>No drugs found. Try a different search.</p>";return;}
  const d=filteredDrugs[curDrug];
  document.getElementById("drugCard").innerHTML=`<div class="drug-card"><div class="dc-top" style="background:${d.color}"><div class="dc-name" style="color:${d.tc}">${d.name}</div><div class="dc-badge" style="background:${d.bg};color:${d.tc}">${d.cls}</div><div class="dc-moa" style="color:${d.tc}">${d.moa}</div></div><div class="dc-body"><div class="dc-block"><label>Indications</label><p>${d.ind}</p></div><div class="dc-block"><label>Side effects</label><p>${d.se}</p></div><div class="dc-block full"><label>Contraindications</label><p>${d.ci}</p></div><div class="dc-block full" style="background:#f8fafb;padding:8px;border-radius:8px"><label>Chapter → Subgroup</label><p>${d.ch} → ${d.sub}</p></div></div></div>`;
}
function renderChapters(){
  document.getElementById("chapterList").innerHTML=chapters.map((ch,ci)=>{
    const drugs=allDrugs.filter(d=>d.ch===ch.name);
    const subs=ch.subs.map(sg=>{
      const sgD=drugs.filter(d=>d.sub===sg);
      if(!sgD.length)return "";
      return `<div class="subgroup"><div class="sg-title">${sg} <span style="font-size:11px;color:#999;font-weight:400">(${sgD.length})</span></div><div class="sg-drugs">${sgD.map(d=>`<span class="sg-drug" onclick="jumpToDrug('${d.name}')">${d.name}</span>`).join("")}</div></div>`;
    }).join("");
    return `<div class="chapter"><div class="ch-hdr" onclick="togCh(${ci})"><span>${ch.icon} ${ch.name}<span class="ch-badge" style="background:${ch.bg};color:${ch.tc}">${drugs.length} drugs</span></span><span style="color:#999">▾</span></div><div class="ch-body" id="ch-${ci}">${subs}</div></div>`;
  }).join("");
}
function togCh(i){document.getElementById("ch-"+i).classList.toggle("open");}
function jumpToDrug(name){document.getElementById("searchInput").value=name;document.getElementById("chapterFilter").value="";filterDrugs();switchTab("flash");}
function loadQ(){
  if(qIdx>=quizCases.length){showResult();return;}
  answered=false;
  const q=quizCases[qIdx];
  document.getElementById("progBar").style.width=((qIdx/quizCases.length)*100)+"%";
  document.getElementById("qCount").textContent=`Case ${qIdx+1} of ${quizCases.length} · Score: ${score}/${qIdx}`;
  document.getElementById("quizArea").innerHTML=`<div class="quiz-case"><div class="quiz-case-label">📋 Clinical Case ${qIdx+1}</div><div class="quiz-vignette">${q.v}</div><div class="quiz-q">${q.q}</div><div class="quiz-opts">${q.opts.map((o,i)=>`<button class="quiz-opt" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${o}</button>`).join("")}</div><div class="quiz-fb" id="qfb"></div><div class="quiz-nav"><span class="score-txt" id="qsc">Choose your answer</span><button class="btn btn-primary" id="qnxt" onclick="nextQ()" style="display:none">Next case →</button></div></div>`;
}
function answer(i){
  if(answered)return;
  answered=true;
  const q=quizCases[qIdx];
  document.querySelectorAll(".quiz-opt").forEach(o=>o.disabled=true);
  document.querySelectorAll(".quiz-opt")[i].classList.add(i===q.ans?"correct":"wrong");
  document.querySelectorAll(".quiz-opt")[q.ans].classList.add("correct");
  const ok=i===q.ans;
  if(ok)score++;
  const fb=document.getElementById("qfb");
  fb.className="quiz-fb show "+(ok?"correct":"wrong");
  fb.innerHTML=`<strong>${ok?"✓ Correct!":"✗ Incorrect."}</strong> ${q.e}`;
  document.getElementById("qsc").textContent=`Score: ${score}/${qIdx+1}`;
  document.getElementById("qnxt").style.display="inline-block";
}
function nextQ(){qIdx++;loadQ();}
function showResult(){
  const pct=Math.round((score/quizCases.length)*100);
  const msg=pct>=80?"🏆 Outstanding — exam-ready!":pct>=60?"👍 Good effort — review the cases you missed.":"📖 Keep studying — revisit the drug chapters.";
  const col=pct>=80?"#1D9E75":pct>=60?"#BA7517":"#e33";
  document.getElementById("progBar").style.width="100%";
  document.getElementById("qCount").textContent="All cases complete!";
  document.getElementById("quizArea").innerHTML=`<div class="quiz-case" style="text-align:center;padding:2rem"><div style="font-size:56px;margin-bottom:1rem">${pct>=80?"🏆":pct>=60?"👍":"📖"}</div><h2 style="font-size:28px;color:${col};margin-bottom:8px">${pct}%</h2><p style="font-size:16px;margin-bottom:6px">You scored <strong>${score} out of ${quizCases.length}</strong></p><p style="color:#666;margin-bottom:1.5rem">${msg}</p><button class="btn btn-primary" onclick="qIdx=0;score=0;loadQ()">🔄 Restart all cases</button></div>`;
}
</script>
